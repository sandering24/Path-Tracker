  <style>
    :root {
      --bg:        oklch(96.5% 0.008 75);
      --surface:   oklch(99.5% 0.003 75);
      --border:    oklch(88% 0.01 75);
      --text:      oklch(14% 0.015 250);
      --muted:     oklch(58% 0.015 250);
      --dim:       oklch(74% 0.01 250);
      --accent:    oklch(50% 0.22 248);
      --accent-bg: oklch(96% 0.04 248);
      --green:     oklch(58% 0.18 148);
      --green-bg:  oklch(96% 0.04 148);
      --yellow:    oklch(68% 0.19 72);
      --yellow-bg: oklch(97% 0.05 72);
      --red:       oklch(56% 0.22 25);
      --red-bg:    oklch(97% 0.04 25);
      --shadow:    0 2px 16px oklch(14% 0.015 250 / 0.07);
      --shadow-lg: 0 8px 40px oklch(14% 0.015 250 / 0.12);
      --radius:    20px;
      --bottom-nav-h: 80px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom, 0));
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 22px 12px;
    }
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo span {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      margin-left: 3px;
      vertical-align: middle;
      margin-bottom: 2px;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    #status {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      line-height: 1.5;
      font-weight: 400;
    }
    #status.error { color: var(--red); }
    .refresh-icon-btn {
      background: none; border: none; cursor: pointer;
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 16px;
      transition: background 0.15s, color 0.15s;
    }
    .refresh-icon-btn:active { background: var(--border); color: var(--text); }

    /* ── Progress bar ── */
    .progress-track {
      height: 2px;
      background: transparent;
      overflow: hidden;
      margin: 0 22px;
      border-radius: 2px;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      opacity: 0.35;
      transition: none;
      border-radius: 2px;
    }

    /* ── Alert banner ── */
    #alerts-banner {
      display: none;
      margin: 12px 16px 4px;
      border-radius: 14px;
      overflow: hidden;
    }
    .alert-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .alert-item:last-child { border-bottom: none; }
    .alert-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .alert-body { flex: 1; min-width: 0; }
    .alert-title { font-size: 13px; font-weight: 600; line-height: 1.3; }
    .alert-desc  { font-size: 12px; opacity: 0.75; margin-top: 2px; line-height: 1.4; }
    .alert-banner-high    { background: var(--red-bg);    color: oklch(38% 0.18 25); }
    .alert-banner-medium  { background: var(--yellow-bg); color: oklch(42% 0.15 72); }
    .alert-banner-low     { background: var(--green-bg);  color: oklch(40% 0.14 148); }
    .alert-banner-default { background: var(--accent-bg); color: oklch(36% 0.18 248); }

    /* ── Direction toggle ── */
    .direction-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 22px 14px;
      gap: 8px;
    }
    .dir-pills {
      display: flex;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 3px;
    }
    .dir-pill {
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 100px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .dir-pill.active {
      background: var(--accent);
      color: #fff;
    }
    .dir-counter {
      font-size: 12px;
      color: var(--dim);
      font-weight: 400;
    }

    /* ── Custom picker ── */
    #custom-picker {
      display: none;
      margin: 0 16px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
    }
    .picker-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .picker-group { flex: 1; min-width: 0; }
    .picker-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--dim);
      margin-bottom: 5px;
      font-weight: 500;
    }
    .station-select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 10px;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }
    .station-select:focus { outline: none; border-color: var(--accent); }
    .picker-arrow {
      font-size: 14px;
      color: var(--dim);
      flex-shrink: 0;
      margin-top: 18px;
    }

    /* ── Swipe container ── */
    .swipe-viewport {
      overflow: hidden;
      padding: 0 16px;
    }
    .swipe-track {
      display: flex;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    .swipe-card {
      flex: 0 0 100%;
      min-width: 0;
    }

    /* ── Route card ── */
    .route-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .route-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .route-direction-tag {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      background: var(--accent-bg);
      padding: 3px 8px;
      border-radius: 6px;
      margin-bottom: 6px;
      display: inline-block;
    }
    .route-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--text);
      line-height: 1.1;
    }
    .route-header-right { text-align: right; }
    .next-label { font-size: 10px; color: var(--dim); }

    /* ── Train rows ── */
    .train-row {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .train-row:last-child { border-bottom: none; }
    .train-row.dim { opacity: 0.3; }

    .line-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .line-bar {
      width: 3px;
      border-radius: 2px;
      flex-shrink: 0;
      align-self: stretch;
      min-height: 36px;
    }

    .train-info { flex: 1; min-width: 0; }
    .train-headsign {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .train-note { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .train-time { text-align: right; flex-shrink: 0; }
    .minutes {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -1.5px;
      color: var(--text);
    }
    .minutes.now  {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0;
      color: var(--green);
      background: var(--green-bg);
      padding: 4px 10px;
      border-radius: 100px;
    }
    .minutes.soon { color: var(--yellow); }
    .minutes-label {
      font-size: 10px;
      color: var(--dim);
      text-align: right;
      margin-top: 1px;
      font-weight: 400;
    }
    .arrival-time {
      font-size: 11px;
      color: var(--dim);
      text-align: right;
      margin-top: 3px;
    }

    .train-row.secondary .minutes {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.8px;
      color: var(--muted);
    }

    /* ── Scheduled section ── */
    .sched-section {
      padding: 14px 20px 16px;
      border-top: 1px solid var(--border);
    }
    .sched-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 9px;
    }
    .sched-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .sched-pill {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      white-space: nowrap;
    }
    .sched-empty, .sched-loading { font-size: 12px; color: var(--dim); font-style: italic; }

    /* ── States ── */
    .empty {
      padding: 30px 20px;
      color: var(--dim);
      font-size: 14px;
      text-align: center;
    }
    .loading {
      padding: 30px 20px;
      color: var(--dim);
      font-size: 13px;
      text-align: center;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.8; }
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom, 0));
      padding-bottom: env(safe-area-inset-bottom, 0);
      background: oklch(99% 0.004 75 / 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding-left: 8px;
      padding-right: 8px;
      gap: 2px;
      z-index: 100;
    }
    .nav-tab {
      flex: 1;
      background: none;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 4px;
      cursor: pointer;
      border-radius: 14px;
      transition: background 0.15s;
      min-height: 56px;
    }
    .nav-tab:active { background: var(--border); }
    .nav-tab-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--dim);
      line-height: 1.2;
      text-align: center;
      transition: color 0.15s;
    }
    .nav-tab-icon {
      width: 36px; height: 26px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--dim);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      letter-spacing: -0.3px;
    }
    .nav-tab.active .nav-tab-icon {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .nav-tab.active .nav-tab-label { color: var(--accent); font-weight: 600; }

    /* ── Tweaks panel ── */
    #tweaks-panel {
      display: none;
      position: fixed;
      bottom: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom, 0) + 12px);
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow-lg);
      padding: 18px 20px;
      width: 240px;
      z-index: 200;
    }
    #tweaks-panel h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 14px;
    }
    .tweak-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .tweak-row:last-child { margin-bottom: 0; }
    .tweak-row label { font-size: 13px; color: var(--muted); }
    .tweak-toggle {
      width: 44px; height: 26px;
      background: var(--border);
      border-radius: 100px;
      border: none;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }
    .tweak-toggle.on { background: var(--accent); }
    .tweak-toggle::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      transition: left 0.2s;
    }
    .tweak-toggle.on::after { left: 21px; }
    .tweak-select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 4px 8px;
      -webkit-appearance: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">PATH<span></span></div>
  <div class="header-right">
    <div id="status">Loading…</div>
    <button class="refresh-icon-btn" onclick="manualRefresh()" title="Refresh">↻</button>
  </div>
</header>

<div class="progress-track">
  <div id="progress-fill"></div>
</div>

<div id="alerts-banner"></div>

<div class="direction-toggle">
  <div class="dir-pills">
    <button class="dir-pill active" id="pill-out" onclick="setDirection(0)">Outbound</button>
    <button class="dir-pill" id="pill-ret" onclick="setDirection(1)">Return</button>
  </div>
  <div class="dir-counter" id="dir-counter"></div>
</div>

<div id="custom-picker">
  <div class="picker-row">
    <div class="picker-group">
      <div class="picker-label">From</div>
      <select id="sel-from" class="station-select"></select>
    </div>
    <div class="picker-arrow">→</div>
    <div class="picker-group">
      <div class="picker-label">To</div>
      <select id="sel-to" class="station-select"></select>
    </div>
  </div>
</div>

<div class="swipe-viewport">
  <div class="swipe-track" id="swipe-track">

    <!-- Outbound card -->
    <div class="swipe-card">
      <div class="route-card">
        <div class="route-header">
          <div>
            <div class="route-direction-tag">Outbound</div>
            <div id="label-out" class="route-label">—</div>
          </div>
        </div>
        <div id="trains-out" class="loading">Fetching trains…</div>
      </div>
    </div>

    <!-- Return card -->
    <div class="swipe-card" style="padding-left: 12px;">
      <div class="route-card">
        <div class="route-header">
          <div>
            <div class="route-direction-tag" style="background: oklch(96% 0.04 148); color: oklch(36% 0.16 148);">Return</div>
            <div id="label-ret" class="route-label">—</div>
          </div>
        </div>
        <div id="trains-ret" class="loading">Fetching trains…</div>
      </div>
    </div>

  </div>
</div>

<!-- Bottom nav -->
<nav class="bottom-nav" id="bottom-nav"></nav>

<!-- Tweaks panel -->
<div id="tweaks-panel">
  <h3>Tweaks</h3>
  <div class="tweak-row">
    <label>Compact mode</label>
    <button class="tweak-toggle" id="tweak-compact" onclick="toggleCompact(this)"></button>
  </div>
  <div class="tweak-row">
    <label>Show arrival time</label>
    <button class="tweak-toggle on" id="tweak-arrival" onclick="toggleArrival(this)"></button>
  </div>
  <div class="tweak-row">
    <label>Train count</label>
    <select class="tweak-select" id="tweak-count" onchange="setTrainCount(this.value)">
      <option value="2">2 trains</option>
      <option value="3">3 trains</option>
      <option value="4" selected="">4 trains</option>
    </select>
  </div>
</div>

<script>
  const PROXY             = 'https://path-proxy.qzhu24.workers.dev/?q=';
  const API_URL           = PROXY + 'trains';
  const ALERTS_URL        = PROXY + 'alerts';
  const WEEKDAY_SCHED_RAW = PROXY + 'weekday';
  const SUNDAY_SCHED_RAW  = PROXY + 'sunday';
  const REFRESH_MS        = 30000;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "compactMode": false,
    "showArrival": true,
    "trainCount": 4
  }/*EDITMODE-END*/;

  let tweaks = { ...TWEAK_DEFAULTS };

  const LINES = [
    ['NWK', 'HAR', 'JSQ', 'GRV', 'EXP', 'WTC'],
    ['HOB', 'EXP', 'WTC'],
    ['JSQ', 'GRV', 'NEW', 'HOB', 'CHR', '09S', '14S', '23S', '33S'],
    ['NWK', 'HAR', 'JSQ', 'GRV', 'NEW', 'HOB', 'CHR', '09S', '14S', '23S', '33S'],
    ['HOB', 'CHR', '09S', '14S', '23S', '33S'],
  ];

  const STATIONS = {
    'NWK': 'Newark', 'HAR': 'Harrison', 'JSQ': 'Journal Sq',
    'GRV': 'Grove St', 'EXP': 'Exchange Pl', 'NEW': 'Newport',
    'HOB': 'Hoboken', 'WTC': 'World Trade', 'CHR': 'Christopher St',
    '09S': '9th St', '14S': '14th St', '23S': '23rd St', '33S': '33rd St',
  };

  const PRESETS = [
    { id: 'grv-23s', tabLabel: 'GRV↔23S', from: 'GRV', to: '23S' },
    { id: 'grv-wtc', tabLabel: 'GRV↔WTC', from: 'GRV', to: 'WTC' },
    { id: 'exp-wtc', tabLabel: 'EXP↔WTC', from: 'EXP', to: 'WTC' },
    { id: 'custom',  tabLabel: '＋ Custom', from: null, to: null },
  ];

  let activeTabId  = PRESETS[0].id;
  let activeDir    = 0; // 0=outbound, 1=return
  let lastResults  = [];
  let refreshTimer = null;
  let scheduleData = null;

  // ── Tweaks ──────────────────────────────────────────────────────

  window.addEventListener('message', e => {
    if (e.data?.type === '__activate_edit_mode')   document.getElementById('tweaks-panel').style.display = 'block';
    if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');

  function toggleCompact(btn) {
    tweaks.compactMode = !tweaks.compactMode;
    btn.classList.toggle('on', tweaks.compactMode);
    document.body.style.setProperty('--train-row-pad', tweaks.compactMode ? '10px 20px' : '14px 20px');
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { compactMode: tweaks.compactMode } }, '*');
  }
  function toggleArrival(btn) {
    tweaks.showArrival = !tweaks.showArrival;
    btn.classList.toggle('on', tweaks.showArrival);
    renderCurrentView(lastResults);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { showArrival: tweaks.showArrival } }, '*');
  }
  function setTrainCount(val) {
    tweaks.trainCount = parseInt(val);
    renderCurrentView(lastResults);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { trainCount: tweaks.trainCount } }, '*');
  }

  // ── Direction swipe ─────────────────────────────────────────────

  function setDirection(dir) {
    activeDir = dir;
    const track = document.getElementById('swipe-track');
    track.style.transform = dir === 0 ? 'translateX(0)' : 'translateX(-100%)';
    document.getElementById('pill-out').classList.toggle('active', dir === 0);
    document.getElementById('pill-ret').classList.toggle('active', dir === 1);
    updateDirCounter();
  }

  // Touch swipe
  let touchStartX = 0;
  const viewport = document.querySelector('.swipe-viewport');
  viewport.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  viewport.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) setDirection(dx < 0 ? 1 : 0);
  }, { passive: true });

  function updateDirCounter() {
    const label = activeDir === 0 ? 'Outbound · swipe for return →' : '← swipe for outbound · Return';
    document.getElementById('dir-counter').textContent = label;
  }

  // ── Schedule helpers ────────────────────────────────────────────

  function getScheduleUrl() {
    const day = new Date().getDay();
    return (day === 0 || day === 6) ? SUNDAY_SCHED_RAW : WEEKDAY_SCHED_RAW;
  }
  function parseTimeToMinutes(str) {
    const m = str.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
    if (!m) return null;
    let h = parseInt(m[1], 10), min = parseInt(m[2], 10);
    if (m[3].toUpperCase() === 'AM') { if (h === 12) h = 0; }
    else { if (h !== 12) h += 12; }
    return h * 60 + min;
  }
  function currentTimeInMinutes() {
    const now = new Date(); return now.getHours() * 60 + now.getMinutes();
  }
  const HEADER_TO_CODE = {
    'newark':'NWK','harrison':'HAR','journal square':'JSQ','jsq':'JSQ',
    'grove st':'GRV','exchange':'EXP','newport':'NEW','hoboken':'HOB',
    'world trade':'WTC','wtc':'WTC','chris st':'CHR','christopher':'CHR',
    '9 st':'09S','9th st':'09S','14 st':'14S','14th st':'14S',
    '23 st':'23S','23rd st':'23S','33 st':'33S','33rd st':'33S',
  };
  function headerToCode(text) {
    const lower = text.toLowerCase();
    for (const [key, code] of Object.entries(HEADER_TO_CODE)) {
      if (lower.includes(key)) return code;
    }
    return null;
  }
  function parseScheduleTable(html) {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const rows = Array.from(doc.querySelectorAll('tr'));
    if (rows.length < 2) return null;
    const headers  = Array.from(rows[0].querySelectorAll('td')).map(td => td.textContent.trim());
    const dataRows = rows.slice(1).map(tr => Array.from(tr.querySelectorAll('td')).map(td => td.textContent.trim()));
    return { headers, dataRows };
  }
  async function loadSchedule() {
    const url = getScheduleUrl();
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('schedule fetch failed');
      const data = await res.json();
      const root = data[':items']['root'][':items'];
      const accordion = root['accordionlist_copy'] || root['accordionlist'];
      if (!accordion) throw new Error('accordion not found');
      const parsed = [];
      for (const key of Object.keys(accordion[':items'])) {
        const item = accordion[':items'][key];
        const innerItems = item[':items'] || {};
        let html = null;
        for (const subKey of Object.keys(innerItems)) {
          const candidate = innerItems[subKey].text;
          if (candidate && candidate.includes('<table')) { html = candidate; break; }
        }
        if (!html) continue;
        const table = parseScheduleTable(html);
        if (!table) continue;
        const columnIndex = {};
        table.headers.forEach((h, i) => { const code = headerToCode(h); if (code && !(code in columnIndex)) columnIndex[code] = i; });
        parsed.push({ columnIndex, rows: table.dataRows });
      }
      scheduleData = parsed;
      if (lastResults.length > 0) renderCurrentView(lastResults);
    } catch (err) { console.warn('Schedule load failed:', err); scheduleData = []; }
  }
  function findScheduleTables(from, to) {
    if (!scheduleData) return [];
    return scheduleData.filter(t => { const fi = t.columnIndex[from], ti = t.columnIndex[to]; return fi !== undefined && ti !== undefined && fi < ti; });
  }
  function getNextScheduledTimes(from, to, count = 3) {
    const tables = findScheduleTables(from, to);
    if (tables.length === 0) return null;
    const nowMins = currentTimeInMinutes();
    const isEmpty = s => !s || s === '—' || s === '-' || s.trim() === '';
    const allTimes = [];
    for (const table of tables) {
      const fi = table.columnIndex[from], ti = table.columnIndex[to];
      for (const row of table.rows) {
        if (isEmpty(row[fi]) || isEmpty(row[ti])) continue;
        const mins = parseTimeToMinutes(row[fi]);
        if (mins !== null) allTimes.push({ str: row[fi], mins });
      }
    }
    if (allTimes.length === 0) return [];
    allTimes.sort((a, b) => a.mins - b.mins);
    const future = allTimes.filter(t => t.mins > nowMins);
    const past   = allTimes.filter(t => t.mins <= nowMins);
    return [...future, ...past].slice(0, count).map(t => t.str);
  }
  function buildScheduledSection(from, to) {
    if (scheduleData === null)
      return `<div class="sched-section"><div class="sched-label">Scheduled</div><div class="sched-loading">Loading schedule…</div></div>`;
    if (scheduleData.length === 0) return '';
    const times = getNextScheduledTimes(from, to);
    if (times === null) return '';
    let inner = times.length === 0
      ? '<span class="sched-empty">No more trains today</span>'
      : `<div class="sched-pills">${times.map(t => `<span class="sched-pill">${t}</span>`).join('')}</div>`;
    return `<div class="sched-section"><div class="sched-label">Next scheduled</div>${inner}</div>`;
  }

  // ── Alerts ──────────────────────────────────────────────────────

  function renderAlerts(incidents) {
    const banner = document.getElementById('alerts-banner');
    if (!incidents || incidents.length === 0) { banner.style.display = 'none'; banner.innerHTML = ''; return; }
    const items = incidents.map(inc => {
      const title = inc.name || inc.title || inc.subject || 'Service Alert';
      const desc  = inc.description || inc.summary || inc.message || inc.details || '';
      const pri   = (inc.priority || inc.severity || '').toLowerCase();
      let cls = 'alert-banner-default', icon = 'ℹ';
      if (pri.includes('high') || pri.includes('critical')) { cls = 'alert-banner-high'; icon = '!'; }
      else if (pri.includes('medium') || pri.includes('moderate')) { cls = 'alert-banner-medium'; icon = '!'; }
      else if (pri.includes('low')) { cls = 'alert-banner-low'; icon = 'i'; }
      else if (title.toLowerCase().includes('delay') || title.toLowerCase().includes('suspend')) { cls = 'alert-banner-high'; icon = '!'; }
      else if (title.toLowerCase().includes('slow') || title.toLowerCase().includes('disrupt')) { cls = 'alert-banner-medium'; icon = '!'; }
      return `<div class="alert-item ${cls}">
        <div class="alert-icon" style="font-style:normal;font-weight:700;font-size:13px;width:20px;height:20px;border-radius:50%;background:currentColor;opacity:0.2;display:flex;align-items:center;justify-content:center;position:relative">
          <span style="position:absolute;opacity:5">${icon}</span>
        </div>
        <div class="alert-body">
          <div class="alert-title">${title}</div>
          ${desc ? `<div class="alert-desc">${desc}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    banner.innerHTML = items;
    banner.style.display = 'block';
  }

  // ── Routing ─────────────────────────────────────────────────────

  function getApiDirection(origin, dest) {
    for (const line of LINES) {
      const oi = line.indexOf(origin), di = line.indexOf(dest);
      if (oi === -1 || di === -1) continue;
      if (di > oi) return 'ToNY';
      if (di < oi) return 'ToNJ';
    }
    return null;
  }
  function trainServesDest(origin, target, dest) {
    for (const line of LINES) {
      const oi = line.indexOf(origin), ti = line.indexOf(target);
      if (oi === -1 || ti === -1) continue;
      const di = line.indexOf(dest);
      if (di === -1) continue;
      const lo = Math.min(oi, ti), hi = Math.max(oi, ti);
      if (di > lo && di <= hi) return true;
    }
    return false;
  }

  // ── Render ──────────────────────────────────────────────────────

  function parseColors(str) {
    if (!str) return ['#aaa'];
    return str.split(',').map(c => c.startsWith('#') ? c : '#' + c);
  }
  function lineBarHtml(str) {
    const color = parseColors(str)[0];
    return `<div class="line-bar" style="background:${color}"></div>`;
  }
  function minsFromSeconds(secs) { return Math.round(parseInt(secs, 10) / 60); }
  function arrivalTimeStr(secs) {
    const t = new Date(Date.now() + parseInt(secs, 10) * 1000);
    return t.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }

  function trainRowHtml(msg, note, dimmed, isPrimary) {
    const mins = minsFromSeconds(msg.secondsToArrival);
    let cls = '', text, label;
    if (mins <= 0) { cls = 'now'; text = 'Now'; label = ''; }
    else if (mins <= 3) { cls = 'soon'; text = String(mins); label = 'min'; }
    else { text = String(mins); label = 'min'; }
    const arrival = (mins > 0 && tweaks.showArrival)
      ? `<div class="arrival-time">${arrivalTimeStr(msg.secondsToArrival)}</div>` : '';
    const rowCls = [dimmed ? 'dim' : '', isPrimary ? '' : 'secondary'].filter(Boolean).join(' ');
    return `
      <div class="train-row${rowCls ? ' ' + rowCls : ''}">
        ${lineBarHtml(msg.lineColor)}
        <div class="train-info">
          <div class="train-headsign">${msg.headSign}</div>
          ${note ? `<div class="train-note">${note}</div>` : ''}
        </div>
        <div class="train-time">
          <div class="minutes ${cls}">${text}</div>
          ${label ? `<div class="minutes-label">${label}</div>` : ''}
          ${arrival}
        </div>
      </div>`;
  }

  function getStationMessages(results, stationCode, direction) {
    const station = results.find(s => s.consideredStation === stationCode);
    if (!station) return [];
    const dest = (station.destinations || []).find(d => d.label === direction);
    return dest ? (dest.messages || []) : [];
  }

  function renderCard(from, to, results, labelEl, trainsEl) {
    labelEl.textContent = `${STATIONS[from] || from} → ${STATIONS[to] || to}`;
    const dir = getApiDirection(from, to);
    if (!dir) { trainsEl.innerHTML = '<div class="empty">No direct PATH service between these stations</div>'; return; }
    const trains = getStationMessages(results, from, dir);
    if (trains.length === 0) { trainsEl.innerHTML = '<div class="empty">No trains currently</div>'; return; }
    const serving = trains.filter(m => trainServesDest(from, m.target, to));
    let html = serving.length > 0
      ? serving.slice(0, tweaks.trainCount).map((m, i) => trainRowHtml(m, null, false, i === 0)).join('')
      : `<div class="empty">No direct trains to ${STATIONS[to] || to} right now</div>`;
    trainsEl.innerHTML = html;
    const schedHtml = buildScheduledSection(from, to);
    if (schedHtml) trainsEl.insertAdjacentHTML('beforeend', schedHtml);
  }

  function getActiveRoute() {
    if (activeTabId === 'custom') {
      return { from: document.getElementById('sel-from').value, to: document.getElementById('sel-to').value };
    }
    return PRESETS.find(p => p.id === activeTabId) || PRESETS[0];
  }

  function renderCurrentView(results) {
    const { from, to } = getActiveRoute();
    if (!from || !to || from === to) {
      const msg = '<div class="empty">Select two different stations</div>';
      document.getElementById('trains-out').innerHTML = msg;
      document.getElementById('trains-ret').innerHTML = msg;
      return;
    }
    renderCard(from, to, results, document.getElementById('label-out'), document.getElementById('trains-out'));
    renderCard(to, from, results, document.getElementById('label-ret'), document.getElementById('trains-ret'));
  }

  // ── Bottom nav ──────────────────────────────────────────────────

  function buildNav() {
    const nav = document.getElementById('bottom-nav');
    nav.innerHTML = PRESETS.map(p => `
      <button class="nav-tab${p.id === activeTabId ? ' active' : ''}" onclick="switchTab('${p.id}')">
        <div class="nav-tab-icon">${p.id === 'custom' ? '+' : p.tabLabel.split('↔')[0]}</div>
        <div class="nav-tab-label">${p.tabLabel}</div>
      </button>`).join('');
  }

  function switchTab(id) {
    activeTabId = id;
    buildNav();
    document.getElementById('custom-picker').style.display = id === 'custom' ? 'block' : 'none';
    renderCurrentView(lastResults);
  }

  // ── Custom picker ───────────────────────────────────────────────

  function buildPicker() {
    const opts = Object.entries(STATIONS).map(([code, name]) => `<option value="${code}">${name}</option>`).join('');
    const selFrom = document.getElementById('sel-from');
    const selTo   = document.getElementById('sel-to');
    selFrom.innerHTML = opts; selTo.innerHTML = opts;
    selFrom.value = 'GRV'; selTo.value = '23S';
    selFrom.addEventListener('change', () => renderCurrentView(lastResults));
    selTo.addEventListener('change',   () => renderCurrentView(lastResults));
  }

  // ── Progress ────────────────────────────────────────────────────

  function startProgress() {
    const fill = document.getElementById('progress-fill');
    fill.style.transition = 'none'; fill.style.width = '0%';
    fill.getBoundingClientRect();
    fill.style.transition = `width ${REFRESH_MS / 1000}s linear`;
    fill.style.width = '100%';
  }

  // ── Fetch ────────────────────────────────────────────────────────

  async function refresh() {
    clearTimeout(refreshTimer);
    startProgress();
    const statusEl = document.getElementById('status');
    statusEl.textContent = 'Updating…';
    statusEl.className = '';
    try {
      const [trainsRes, alertsRes] = await Promise.allSettled([fetch(API_URL), fetch(ALERTS_URL)]);
      if (trainsRes.status === 'fulfilled' && trainsRes.value.ok) {
        const data = await trainsRes.value.json();
        lastResults = data.results || [];
        renderCurrentView(lastResults);
      } else { throw new Error('Train fetch failed'); }
      if (alertsRes.status === 'fulfilled' && alertsRes.value.ok) {
        const alertData = await alertsRes.value.json();
        const incidents = Array.isArray(alertData)
          ? alertData
          : (alertData.data || alertData.incidents || alertData.results || alertData.items || []);
        renderAlerts(incidents);
      }
      const now = new Date();
      statusEl.innerHTML = `${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}<br><span style="color:var(--dim);font-size:9px">auto ↻ 30s</span>`;
    } catch (err) {
      statusEl.textContent = 'Error'; statusEl.className = 'error'; console.error(err);
    }
    refreshTimer = setTimeout(refresh, REFRESH_MS);
  }

  function manualRefresh() { clearTimeout(refreshTimer); refresh(); }

  // ── Init ─────────────────────────────────────────────────────────

  buildNav();
  buildPicker();
  updateDirCounter();
  loadSchedule();
  refresh();
</script>


</body></html>
