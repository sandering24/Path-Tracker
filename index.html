  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

y: flex; align-items: center; gap: 10px; }\n    #status {\n      font-size: 11px;\n      color: var(--muted);\n      text-align: right;\n      line-height: 1.5;\n      font-weight: 400;\n    }\n    #status.error { color: var(--red); }\n    .refresh-icon-btn {\n      background: none; border: none; cursor: pointer;\n      width: 32px; height: 32px; border-radius: 50%;\n      display: flex; align-items: center; justify-content: center;\n      color: var(--muted); font-size: 16px;\n      transition: background 0.15s, color 0.15s;\n    }\n    .refresh-icon-btn:active { background: var(--border); color: var(--text); }\n\n    /* ── Progress bar ── */\n    .progress-track {\n      height: 2px;\n      background: transparent;\n      overflow: hidden;\n      margin: 0 22px;\n      border-radius: 2px;\n    }\n    #progress-fill {\n      height: 100%;\n      width: 0%;\n      background: var(--accent);\n      opacity: 0.35;\n      transition: none;\n      border-radius: 2px;\n    }\n\n    /* ── Alert banner ── */\n    #alerts-banner {\n      display: none;\n      margin: 12px 16px 4px;\n      border-radius: 14px;\n      overflow: hidden;\n    }\n    .alert-item {\n      display: flex;\n      align-items: flex-start;\n      gap: 10px;\n      padding: 12px 14px;\n      border-bottom: 1px solid rgba(0,0,0,0.06);\n    }\n    .alert-item:last-child { border-bottom: none; }\n    .alert-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }\n    .alert-body { flex: 1; min-width: 0; }\n    .alert-title { font-size: 13px; font-weight: 600; line-height: 1.3; }\n    .alert-desc  { font-size: 12px; opacity: 0.75; margin-top: 2px; line-height: 1.4; }\n    .alert-banner-high    { background: var(--red-bg);    color: oklch(38% 0.18 25); }\n    .alert-banner-medium  { background: var(--yellow-bg); color: oklch(42% 0.15 72); }\n    .alert-banner-low     { background: var(--green-bg);  color: oklch(40% 0.14 148); }\n    .alert-banner-default { background: var(--accent-bg); color: oklch(36% 0.18 248); }\n\n    /* ── Direction toggle ── */\n    .direction-toggle {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      padding: 10px 22px 14px;\n      gap: 8px;\n    }\n    .dir-pills {\n      display: flex;\n      gap: 6px;\n      background: var(--surface);\n      border: 1px solid var(--border);\n      border-radius: 100px;\n      padding: 3px;\n    }\n    .dir-pill {\n      background: none;\n      border: none;\n      font-family: 'DM Sans', sans-serif;\n      font-size: 13px;\n      font-weight: 500;\n      color: var(--muted);\n      padding: 6px 14px;\n      border-radius: 100px;\n      cursor: pointer;\n      transition: background 0.2s, color 0.2s;\n    }\n    .dir-pill.active {\n      background: var(--accent);\n      color: #fff;\n    }\n    .dir-counter {\n      font-size: 12px;\n      color: var(--dim);\n      font-weight: 400;\n    }\n\n    /* ── Custom picker ── */\n    #custom-picker {\n      display: none;\n      margin: 0 16px 12px;\n      background: var(--surface);\n      border: 1px solid var(--border);\n      border-radius: 16px;\n      padding: 14px 16px;\n    }\n    .picker-row {\n      display: flex;\n      align-items: center;\n      gap: 8px;\n    }\n    .picker-group { flex: 1; min-width: 0; }\n    .picker-label {\n      font-size: 10px;\n      text-transform: uppercase;\n      letter-spacing: 0.8px;\n      color: var(--dim);\n      margin-bottom: 5px;\n      font-weight: 500;\n    }\n    .station-select {\n      width: 100%;\n      background: var(--bg);\n      border: 1px solid var(--border);\n      border-radius: 10px;\n      color: var(--text);\n      font-family: 'DM Sans', sans-serif;\n      font-size: 14px;\n      font-weight: 500;\n      padding: 8px 10px;\n      -webkit-appearance: none;\n      appearance: none;\n      cursor: pointer;\n    }\n    .station-select:focus { outline: none; border-color: var(--accent); }\n    .picker-arrow {\n      font-size: 14px;\n      color: var(--dim);\n      flex-shrink: 0;\n      margin-top: 18px;\n    }\n\n    /* ── Swipe container ── */\n    .swipe-viewport {\n      overflow: hidden;\n      padding: 0 16px;\n    }\n    .swipe-track {\n      display: flex;\n      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);\n      will-change: transform;\n    }\n    .swipe-card {\n      flex: 0 0 100%;\n      min-width: 0;\n    }\n\n    /* ── Route card ── */\n    .route-card {\n      background: var(--surface);\n      border: 1px solid var(--border);\n      border-radius: var(--radius);\n      overflow: hidden;\n      box-shadow: var(--shadow);\n    }\n    .route-header {\n      padding: 18px 20px 14px;\n      border-bottom: 1px solid var(--border);\n      display: flex;\n      align-items: flex-end;\n      justify-content: space-between;\n    }\n    .route-direction-tag {\n      font-size: 10px;\n      font-weight: 600;\n      text-transform: uppercase;\n      letter-spacing: 1px;\n      color: var(--accent);\n      background: var(--accent-bg);\n      padding: 3px 8px;\n      border-radius: 6px;\n      margin-bottom: 6px;\n      display: inline-block;\n    }\n    .route-label {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 19px;\n      font-weight: 700;\n      letter-spacing: -0.4px;\n      color: var(--text);\n      line-height: 1.1;\n    }\n    .route-header-right { text-align: right; }\n    .next-label { font-size: 10px; color: var(--dim); }\n\n    /* ── Train rows ── */\n    .train-row {\n      display: flex;\n      align-items: center;\n      padding: 14px 20px;\n      gap: 14px;\n      border-bottom: 1px solid var(--border);\n      transition: background 0.15s;\n    }\n    .train-row:last-child { border-bottom: none; }\n    .train-row.dim { opacity: 0.3; }\n\n    .line-dot {\n      width: 10px; height: 10px;\n      border-radius: 50%;\n      flex-shrink: 0;\n    }\n    .line-bar {\n      width: 3px;\n      border-radius: 2px;\n      flex-shrink: 0;\n      align-self: stretch;\n      min-height: 36px;\n    }\n\n    .train-info { flex: 1; min-width: 0; }\n    .train-headsign {\n      font-size: 15px;\n      font-weight: 600;\n      white-space: nowrap;\n      overflow: hidden;\n      text-overflow: ellipsis;\n      color: var(--text);\n    }\n    .train-note { font-size: 11px; color: var(--muted); margin-top: 2px; }\n\n    .train-time { text-align: right; flex-shrink: 0; }\n    .minutes {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 36px;\n      font-weight: 700;\n      line-height: 1;\n      letter-spacing: -1.5px;\n      color: var(--text);\n    }\n    .minutes.now  {\n      font-family: 'DM Sans', sans-serif;\n      font-size: 13px;\n      font-weight: 600;\n      letter-spacing: 0;\n      color: var(--green);\n      background: var(--green-bg);\n      padding: 4px 10px;\n      border-radius: 100px;\n    }\n    .minutes.soon { color: var(--yellow); }\n    .minutes-label {\n      font-size: 10px;\n      color: var(--dim);\n      text-align: right;\n      margin-top: 1px;\n      font-weight: 400;\n    }\n    .arrival-time {\n      font-size: 11px;\n      color: var(--dim);\n      text-align: right;\n      margin-top: 3px;\n    }\n\n    .train-row.secondary .minutes {\n      font-size: 24px;\n      font-weight: 600;\n      letter-spacing: -0.8px;\n      color: var(--muted);\n    }\n\n    /* ── Scheduled section ── */\n    .sched-section {\n      padding: 14px 20px 16px;\n      border-top: 1px solid var(--border);\n    }\n    .sched-label {\n      font-size: 10px;\n      font-weight: 600;\n      color: var(--dim);\n      text-transform: uppercase;\n      letter-spacing: 0.8px;\n      margin-bottom: 9px;\n    }\n    .sched-pills { display: flex; flex-wrap: wrap; gap: 6px; }\n    .sched-pill {\n      font-size: 12px;\n      font-weight: 500;\n      color: var(--muted);\n      background: var(--bg);\n      border: 1px solid var(--border);\n      border-radius: 8px;\n      padding: 4px 10px;\n      white-space: nowrap;\n    }\n    .sched-empty, .sched-loading { font-size: 12px; color: var(--dim); font-style: italic; }\n\n    /* ── States ── */\n    .empty {\n      padding: 30px 20px;\n      color: var(--dim);\n      font-size: 14px;\n      text-align: center;\n    }\n    .loading {\n      padding: 30px 20px;\n      color: var(--dim);\n      font-size: 13px;\n      text-align: center;\n      animation: pulse 1.2s ease-in-out infinite;\n    }\n    @keyframes pulse {\n      0%, 100% { opacity: 0.3; }\n      50%       { opacity: 0.8; }\n    }\n\n    /* ── Bottom nav ── */\n    .bottom-nav {\n      position: fixed;\n      bottom: 0; left: 0; right: 0;\n      height: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom, 0));\n      padding-bottom: env(safe-area-inset-bottom, 0);\n      background: oklch(99% 0.004 75 / 0.92);\n      backdrop-filter: blur(20px);\n      -webkit-backdrop-filter: blur(20px);\n      border-top: 1px solid var(--border);\n      display: flex;\n      align-items: center;\n      padding-left: 8px;\n      padding-right: 8px;\n      gap: 2px;\n      z-index: 100;\n    }\n    .nav-tab {\n      flex: 1;\n      background: none;\n      border: none;\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      justify-content: center;\n      gap: 4px;\n      padding: 10px 4px;\n      cursor: pointer;\n      border-radius: 14px;\n      transition: background 0.15s;\n      min-height: 56px;\n    }\n    .nav-tab:active { background: var(--border); }\n    .nav-tab-label {\n      font-family: 'DM Sans', sans-serif;\n      font-size: 11px;\n      font-weight: 500;\n      color: var(--dim);\n      line-height: 1.2;\n      text-align: center;\n      transition: color 0.15s;\n    }\n    .nav-tab-icon {\n      width: 36px; height: 26px;\n      background: var(--bg);\n      border: 1.5px solid var(--border);\n      border-radius: 8px;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      font-size: 10px;\n      font-weight: 700;\n      font-family: 'Space Grotesk', sans-serif;\n      color: var(--dim);\n      transition: background 0.15s, border-color 0.15s, color 0.15s;\n      letter-spacing: -0.3px;\n    }\n    .nav-tab.active .nav-tab-icon {\n      background: var(--accent);\n      border-color: var(--accent);\n      color: #fff;\n    }\n    .nav-tab.active .nav-tab-label { color: var(--accent); font-weight: 600; }\n\n    /* ── Tweaks panel ── */\n    #tweaks-panel {\n      display: none;\n      position: fixed;\n      bottom: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom, 0) + 12px);\n      right: 16px;\n      background: var(--surface);\n      border: 1px solid var(--border);\n      border-radius: 18px;\n      box-shadow: var(--shadow-lg);\n      padding: 18px 20px;\n      width: 240px;\n      z-index: 200;\n    }\n    #tweaks-panel h3 {\n      font-size: 13px;\n      font-weight: 600;\n      color: var(--text);\n      margin-bottom: 14px;\n    }\n    .tweak-row {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      margin-bottom: 12px;\n    }\n    .tweak-row:last-child { margin-bottom: 0; }\n    .tweak-row label { font-size: 13px; color: var(--muted); }\n    .tweak-toggle {\n      width: 44px; height: 26px;\n      background: var(--border);\n      border-radius: 100px;\n      border: none;\n      cursor: pointer;\n      position: relative;\n      transition: background 0.2s;\n    }\n    .tweak-toggle.on { background: var(--accent); }\n    .tweak-toggle::after {\n      content: '';\n      position: absolute;\n      top: 3px; left: 3px;\n      width: 20px; height: 20px;\n      border-radius: 50%;\n      background: white;\n      box-shadow: 0 1px 4px rgba(0,0,0,0.2);\n      transition: left 0.2s;\n    }\n    .tweak-toggle.on::after { left: 21px; }\n    .tweak-select {\n      background: var(--bg);\n      border: 1px solid var(--border);\n      border-radius: 8px;\n      color: var(--text);\n      font-family: 'DM Sans', sans-serif;\n      font-size: 12px;\n      padding: 4px 8px;\n      -webkit-appearance: none;\n      cursor: pointer;\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<header>\n  <div class=\"logo\">PATH<span><\u002Fspan><\u002Fdiv>\n  <div class=\"header-right\">\n    <div id=\"status\">Loading…<\u002Fdiv>\n    <button class=\"refresh-icon-btn\" onclick=\"manualRefresh()\" title=\"Refresh\">↻<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"progress-track\">\n  <div id=\"progress-fill\"><\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"alerts-banner\"><\u002Fdiv>\n\n<div class=\"direction-toggle\">\n  <div class=\"dir-pills\">\n    <button class=\"dir-pill active\" id=\"pill-out\" onclick=\"setDirection(0)\">Outbound<\u002Fbutton>\n    <button class=\"dir-pill\" id=\"pill-ret\" onclick=\"setDirection(1)\">Return<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"dir-counter\" id=\"dir-counter\"><\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"custom-picker\">\n  <div class=\"picker-row\">\n    <div class=\"picker-group\">\n      <div class=\"picker-label\">From<\u002Fdiv>\n      <select id=\"sel-from\" class=\"station-select\"><\u002Fselect>\n    <\u002Fdiv>\n    <div class=\"picker-arrow\">→<\u002Fdiv>\n    <div class=\"picker-group\">\n      <div class=\"picker-label\">To<\u002Fdiv>\n      <select id=\"sel-to\" class=\"station-select\"><\u002Fselect>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"swipe-viewport\">\n  <div class=\"swipe-track\" id=\"swipe-track\">\n\n    <!-- Outbound card -->\n    <div class=\"swipe-card\">\n      <div class=\"route-card\">\n        <div class=\"route-header\">\n          <div>\n            <div class=\"route-direction-tag\">Outbound<\u002Fdiv>\n            <div id=\"label-out\" class=\"route-label\">—<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div id=\"trains-out\" class=\"loading\">Fetching trains…<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Return card -->\n    <div class=\"swipe-card\" style=\"padding-left: 12px;\">\n      <div class=\"route-card\">\n        <div class=\"route-header\">\n          <div>\n            <div class=\"route-direction-tag\" style=\"background: oklch(96% 0.04 148); color: oklch(36% 0.16 148);\">Return<\u002Fdiv>\n            <div id=\"label-ret\" class=\"route-label\">—<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div id=\"trains-ret\" class=\"loading\">Fetching trains…<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Bottom nav -->\n<nav class=\"bottom-nav\" id=\"bottom-nav\"><\u002Fnav>\n\n<!-- Tweaks panel -->\n<div id=\"tweaks-panel\">\n  <h3>Tweaks<\u002Fh3>\n  <div class=\"tweak-row\">\n    <label>Compact mode<\u002Flabel>\n    <button class=\"tweak-toggle\" id=\"tweak-compact\" onclick=\"toggleCompact(this)\"><\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <label>Show arrival time<\u002Flabel>\n    <button class=\"tweak-toggle on\" id=\"tweak-arrival\" onclick=\"toggleArrival(this)\"><\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <label>Train count<\u002Flabel>\n    <select class=\"tweak-select\" id=\"tweak-count\" onchange=\"setTrainCount(this.value)\">\n      <option value=\"2\">2 trains<\u002Foption>\n      <option value=\"3\">3 trains<\u002Foption>\n      <option value=\"4\" selected=\"\">4 trains<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  const PANYNJ_URL        = 'https://www.panynj.gov/bin/portauthority/ridepath.json';\n  const API_URL           = 'https://api.codetabs.com/v1/proxy/?quest=' + PANYNJ_URL;\n  const ALERTS_RAW        = 'https://www.panynj.gov/bin/portauthority/everbridge/incidents?status=Active&department=Path';\n  const ALERTS_URL        = 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(ALERTS_RAW);\n  const WEEKDAY_SCHED_RAW = 'https://www.panynj.gov/content/path/en/schedules-maps/weekday-schedules.model.json';\n  const SUNDAY_SCHED_RAW  = 'https://www.panynj.gov/content/path/en/schedules-maps/sunday-schedules.model.json';\n  const REFRESH_MS        = 30000;\n\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"compactMode\": false,\n    \"showArrival\": true,\n    \"trainCount\": 4\n  }/*EDITMODE-END*/;\n\n  let tweaks = { ...TWEAK_DEFAULTS };\n\n  const LINES = [\n    ['NWK', 'HAR', 'JSQ', 'GRV', 'EXP', 'WTC'],\n    ['HOB', 'EXP', 'WTC'],\n    ['JSQ', 'GRV', 'NEW', 'HOB', 'CHR', '09S', '14S', '23S', '33S'],\n    ['NWK', 'HAR', 'JSQ', 'GRV', 'NEW', 'HOB', 'CHR', '09S', '14S', '23S', '33S'],\n    ['HOB', 'CHR', '09S', '14S', '23S', '33S'],\n  ];\n\n  const STATIONS = {\n    'NWK': 'Newark', 'HAR': 'Harrison', 'JSQ': 'Journal Sq',\n    'GRV': 'Grove St', 'EXP': 'Exchange Pl', 'NEW': 'Newport',\n    'HOB': 'Hoboken', 'WTC': 'World Trade', 'CHR': 'Christopher St',\n    '09S': '9th St', '14S': '14th St', '23S': '23rd St', '33S': '33rd St',\n  };\n\n  const PRESETS = [\n    { id: 'grv-23s', tabLabel: 'GRV↔23S', from: 'GRV', to: '23S' },\n    { id: 'grv-wtc', tabLabel: 'GRV↔WTC', from: 'GRV', to: 'WTC' },\n    { id: 'exp-wtc', tabLabel: 'EXP↔WTC', from: 'EXP', to: 'WTC' },\n    { id: 'custom',  tabLabel: '＋ Custom', from: null, to: null },\n  ];\n\n  let activeTabId  = PRESETS[0].id;\n  let activeDir    = 0; // 0=outbound, 1=return\n  let lastResults  = [];\n  let refreshTimer = null;\n  let scheduleData = null;\n\n  // ── Tweaks ──────────────────────────────────────────────────────\n\n  window.addEventListener('message', e => {\n    if (e.data?.type === '__activate_edit_mode')   document.getElementById('tweaks-panel').style.display = 'block';\n    if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';\n  });\n  window.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\n  function toggleCompact(btn) {\n    tweaks.compactMode = !tweaks.compactMode;\n    btn.classList.toggle('on', tweaks.compactMode);\n    document.body.style.setProperty('--train-row-pad', tweaks.compactMode ? '10px 20px' : '14px 20px');\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { compactMode: tweaks.compactMode } }, '*');\n  }\n  function toggleArrival(btn) {\n    tweaks.showArrival = !tweaks.showArrival;\n    btn.classList.toggle('on', tweaks.showArrival);\n    renderCurrentView(lastResults);\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { showArrival: tweaks.showArrival } }, '*');\n  }\n  function setTrainCount(val) {\n    tweaks.trainCount = parseInt(val);\n    renderCurrentView(lastResults);\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { trainCount: tweaks.trainCount } }, '*');\n  }\n\n  // ── Direction swipe ─────────────────────────────────────────────\n\n  function setDirection(dir) {\n    activeDir = dir;\n    const track = document.getElementById('swipe-track');\n    track.style.transform = dir === 0 ? 'translateX(0)' : 'translateX(-100%)';\n    document.getElementById('pill-out').classList.toggle('active', dir === 0);\n    document.getElementById('pill-ret').classList.toggle('active', dir === 1);\n    updateDirCounter();\n  }\n\n  // Touch swipe\n  let touchStartX = 0;\n  const viewport = document.querySelector('.swipe-viewport');\n  viewport.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });\n  viewport.addEventListener('touchend', e => {\n    const dx = e.changedTouches[0].clientX - touchStartX;\n    if (Math.abs(dx) > 50) setDirection(dx < 0 ? 1 : 0);\n  }, { passive: true });\n\n  function updateDirCounter() {\n    const label = activeDir === 0 ? 'Outbound · swipe for return →' : '← swipe for outbound · Return';\n    document.getElementById('dir-counter').textContent = label;\n  }\n\n  // ── Schedule helpers ────────────────────────────────────────────\n\n  function getScheduleUrl() {\n    const day = new Date().getDay();\n    return (day === 0 || day === 6) ? SUNDAY_SCHED_RAW : WEEKDAY_SCHED_RAW;\n  }\n  function parseTimeToMinutes(str) {\n    const m = str.match(/^(\\d{1,2}):(\\d{2})\\s*(AM|PM)$/i);\n    if (!m) return null;\n    let h = parseInt(m[1], 10), min = parseInt(m[2], 10);\n    if (m[3].toUpperCase() === 'AM') { if (h === 12) h = 0; }\n    else { if (h !== 12) h += 12; }\n    return h * 60 + min;\n  }\n  function currentTimeInMinutes() {\n    const now = new Date(); return now.getHours() * 60 + now.getMinutes();\n  }\n  const HEADER_TO_CODE = {\n    'newark':'NWK','harrison':'HAR','journal square':'JSQ','jsq':'JSQ',\n    'grove st':'GRV','exchange':'EXP','newport':'NEW','hoboken':'HOB',\n    'world trade':'WTC','wtc':'WTC','chris st':'CHR','christopher':'CHR',\n    '9 st':'09S','9th st':'09S','14 st':'14S','14th st':'14S',\n    '23 st':'23S','23rd st':'23S','33 st':'33S','33rd st':'33S',\n  };\n  function headerToCode(text) {\n    const lower = text.toLowerCase();\n    for (const [key, code] of Object.entries(HEADER_TO_CODE)) {\n      if (lower.includes(key)) return code;\n    }\n    return null;\n  }\n  function parseScheduleTable(html) {\n    const doc = new DOMParser().parseFromString(html, 'text/html');\n    const rows = Array.from(doc.querySelectorAll('tr'));\n    if (rows.length < 2) return null;\n    const headers  = Array.from(rows[0].querySelectorAll('td')).map(td => td.textContent.trim());\n    const dataRows = rows.slice(1).map(tr => Array.from(tr.querySelectorAll('td')).map(td => td.textContent.trim()));\n    return { headers, dataRows };\n  }\n  async function loadSchedule() {\n    const raw = getScheduleUrl();\n    const url = 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(raw);\n    try {\n      const res = await fetch(url);\n      if (!res.ok) throw new Error('schedule fetch failed');\n      const data = await res.json();\n      const root = data[':items']['root'][':items'];\n      const accordion = root['accordionlist_copy'] || root['accordionlist'];\n      if (!accordion) throw new Error('accordion not found');\n      const parsed = [];\n      for (const key of Object.keys(accordion[':items'])) {\n        const item = accordion[':items'][key];\n        const innerItems = item[':items'] || {};\n        let html = null;\n        for (const subKey of Object.keys(innerItems)) {\n          const candidate = innerItems[subKey].text;\n          if (candidate && candidate.includes('<table')) { html = candidate; break; }\n        }\n        if (!html) continue;\n        const table = parseScheduleTable(html);\n        if (!table) continue;\n        const columnIndex = {};\n        table.headers.forEach((h, i) => { const code = headerToCode(h); if (code && !(code in columnIndex)) columnIndex[code] = i; });\n        parsed.push({ columnIndex, rows: table.dataRows });\n      }\n      scheduleData = parsed;\n      if (lastResults.length > 0) renderCurrentView(lastResults);\n    } catch (err) { console.warn('Schedule load failed:', err); scheduleData = []; }\n  }\n  function findScheduleTables(from, to) {\n    if (!scheduleData) return [];\n    return scheduleData.filter(t => { const fi = t.columnIndex[from], ti = t.columnIndex[to]; return fi !== undefined && ti !== undefined && fi < ti; });\n  }\n  function getNextScheduledTimes(from, to, count = 3) {\n    const tables = findScheduleTables(from, to);\n    if (tables.length === 0) return null;\n    const nowMins = currentTimeInMinutes();\n    const isEmpty = s => !s || s === '—' || s === '-' || s.trim() === '';\n    const allTimes = [];\n    for (const table of tables) {\n      const fi = table.columnIndex[from], ti = table.columnIndex[to];\n      for (const row of table.rows) {\n        if (isEmpty(row[fi]) || isEmpty(row[ti])) continue;\n        const mins = parseTimeToMinutes(row[fi]);\n        if (mins !== null) allTimes.push({ str: row[fi], mins });\n      }\n    }\n    if (allTimes.length === 0) return [];\n    allTimes.sort((a, b) => a.mins - b.mins);\n    const future = allTimes.filter(t => t.mins > nowMins);\n    const past   = allTimes.filter(t => t.mins <= nowMins);\n    return [...future, ...past].slice(0, count).map(t => t.str);\n  }\n  function buildScheduledSection(from, to) {\n    if (scheduleData === null)\n      return `<div class=\"sched-section\"><div class=\"sched-label\">Scheduled<\u002Fdiv><div class=\"sched-loading\">Loading schedule…<\u002Fdiv><\u002Fdiv>`;\n    if (scheduleData.length === 0) return '';\n    const times = getNextScheduledTimes(from, to);\n    if (times === null) return '';\n    let inner = times.length === 0\n      ? '<span class=\"sched-empty\">No more trains today<\u002Fspan>'\n      : `<div class=\"sched-pills\">${times.map(t => `<span class=\"sched-pill\">${t}<\u002Fspan>`).join('')}<\u002Fdiv>`;\n    return `<div class=\"sched-section\"><div class=\"sched-label\">Next scheduled<\u002Fdiv>${inner}<\u002Fdiv>`;\n  }\n\n  // ── Alerts ──────────────────────────────────────────────────────\n\n  function renderAlerts(incidents) {\n    const banner = document.getElementById('alerts-banner');\n    if (!incidents || incidents.length === 0) { banner.style.display = 'none'; banner.innerHTML = ''; return; }\n    const items = incidents.map(inc => {\n      const title = inc.name || inc.title || inc.subject || 'Service Alert';\n      const desc  = inc.description || inc.summary || inc.message || inc.details || '';\n      const pri   = (inc.priority || inc.severity || '').toLowerCase();\n      let cls = 'alert-banner-default', icon = 'ℹ';\n      if (pri.includes('high') || pri.includes('critical')) { cls = 'alert-banner-high'; icon = '!'; }\n      else if (pri.includes('medium') || pri.includes('moderate')) { cls = 'alert-banner-medium'; icon = '!'; }\n      else if (pri.includes('low')) { cls = 'alert-banner-low'; icon = 'i'; }\n      else if (title.toLowerCase().includes('delay') || title.toLowerCase().includes('suspend')) { cls = 'alert-banner-high'; icon = '!'; }\n      else if (title.toLowerCase().includes('slow') || title.toLowerCase().includes('disrupt')) { cls = 'alert-banner-medium'; icon = '!'; }\n      return `<div class=\"alert-item ${cls}\">\n        <div class=\"alert-icon\" style=\"font-style:normal;font-weight:700;font-size:13px;width:20px;height:20px;border-radius:50%;background:currentColor;opacity:0.2;display:flex;align-items:center;justify-content:center;position:relative\">\n          <span style=\"position:absolute;opacity:5\">${icon}<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"alert-body\">\n          <div class=\"alert-title\">${title}<\u002Fdiv>\n          ${desc ? `<div class=\"alert-desc\">${desc}<\u002Fdiv>` : ''}\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n    }).join('');\n    banner.innerHTML = items;\n    banner.style.display = 'block';\n  }\n\n  // ── Routing ─────────────────────────────────────────────────────\n\n  function getApiDirection(origin, dest) {\n    for (const line of LINES) {\n      const oi = line.indexOf(origin), di = line.indexOf(dest);\n      if (oi === -1 || di === -1) continue;\n      if (di > oi) return 'ToNY';\n      if (di < oi) return 'ToNJ';\n    }\n    return null;\n  }\n  function trainServesDest(origin, target, dest) {\n    for (const line of LINES) {\n      const oi = line.indexOf(origin), ti = line.indexOf(target);\n      if (oi === -1 || ti === -1) continue;\n      const di = line.indexOf(dest);\n      if (di === -1) continue;\n      const lo = Math.min(oi, ti), hi = Math.max(oi, ti);\n      if (di > lo && di <= hi) return true;\n    }\n    return false;\n  }\n\n  // ── Render ──────────────────────────────────────────────────────\n\n  function parseColors(str) {\n    if (!str) return ['#aaa'];\n    return str.split(',').map(c => c.startsWith('#') ? c : '#' + c);\n  }\n  function lineBarHtml(str) {\n    const color = parseColors(str)[0];\n    return `<div class=\"line-bar\" style=\"background:${color}\"><\u002Fdiv>`;\n  }\n  function minsFromSeconds(secs) { return Math.round(parseInt(secs, 10) / 60); }\n  function arrivalTimeStr(secs) {\n    const t = new Date(Date.now() + parseInt(secs, 10) * 1000);\n    return t.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });\n  }\n\n  function trainRowHtml(msg, note, dimmed, isPrimary) {\n    const mins = minsFromSeconds(msg.secondsToArrival);\n    let cls = '', text, label;\n    if (mins <= 0) { cls = 'now'; text = 'Now'; label = ''; }\n    else if (mins <= 3) { cls = 'soon'; text = String(mins); label = 'min'; }\n    else { text = String(mins); label = 'min'; }\n    const arrival = (mins > 0 && tweaks.showArrival)\n      ? `<div class=\"arrival-time\">${arrivalTimeStr(msg.secondsToArrival)}<\u002Fdiv>` : '';\n    const rowCls = [dimmed ? 'dim' : '', isPrimary ? '' : 'secondary'].filter(Boolean).join(' ');\n    return `\n      <div class=\"train-row${rowCls ? ' ' + rowCls : ''}\">\n        ${lineBarHtml(msg.lineColor)}\n        <div class=\"train-info\">\n          <div class=\"train-headsign\">${msg.headSign}<\u002Fdiv>\n          ${note ? `<div class=\"train-note\">${note}<\u002Fdiv>` : ''}\n        <\u002Fdiv>\n        <div class=\"train-time\">\n          <div class=\"minutes ${cls}\">${text}<\u002Fdiv>\n          ${label ? `<div class=\"minutes-label\">${label}<\u002Fdiv>` : ''}\n          ${arrival}\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n  }\n\n  function getStationMessages(results, stationCode, direction) {\n    const station = results.find(s => s.consideredStation === stationCode);\n    if (!station) return [];\n    const dest = (station.destinations || []).find(d => d.label === direction);\n    return dest ? (dest.messages || []) : [];\n  }\n\n  function renderCard(from, to, results, labelEl, trainsEl) {\n    labelEl.textContent = `${STATIONS[from] || from} → ${STATIONS[to] || to}`;\n    const dir = getApiDirection(from, to);\n    if (!dir) { trainsEl.innerHTML = '<div class=\"empty\">No direct PATH service between these stations<\u002Fdiv>'; return; }\n    const trains = getStationMessages(results, from, dir);\n    if (trains.length === 0) { trainsEl.innerHTML = '<div class=\"empty\">No trains currently<\u002Fdiv>'; return; }\n    const serving = trains.filter(m => trainServesDest(from, m.target, to));\n    let html = serving.length > 0\n      ? serving.slice(0, tweaks.trainCount).map((m, i) => trainRowHtml(m, null, false, i === 0)).join('')\n      : `<div class=\"empty\">No direct trains to ${STATIONS[to] || to} right now<\u002Fdiv>`;\n    trainsEl.innerHTML = html;\n    const schedHtml = buildScheduledSection(from, to);\n    if (schedHtml) trainsEl.insertAdjacentHTML('beforeend', schedHtml);\n  }\n\n  function getActiveRoute() {\n    if (activeTabId === 'custom') {\n      return { from: document.getElementById('sel-from').value, to: document.getElementById('sel-to').value };\n    }\n    return PRESETS.find(p => p.id === activeTabId) || PRESETS[0];\n  }\n\n  function renderCurrentView(results) {\n    const { from, to } = getActiveRoute();\n    if (!from || !to || from === to) {\n      const msg = '<div class=\"empty\">Select two different stations<\u002Fdiv>';\n      document.getElementById('trains-out').innerHTML = msg;\n      document.getElementById('trains-ret').innerHTML = msg;\n      return;\n    }\n    renderCard(from, to, results, document.getElementById('label-out'), document.getElementById('trains-out'));\n    renderCard(to, from, results, document.getElementById('label-ret'), document.getElementById('trains-ret'));\n  }\n\n  // ── Bottom nav ──────────────────────────────────────────────────\n\n  function buildNav() {\n    const nav = document.getElementById('bottom-nav');\n    nav.innerHTML = PRESETS.map(p => `\n      <button class=\"nav-tab${p.id === activeTabId ? ' active' : ''}\" onclick=\"switchTab('${p.id}')\">\n        <div class=\"nav-tab-icon\">${p.id === 'custom' ? '+' : p.tabLabel.split('↔')[0]}<\u002Fdiv>\n        <div class=\"nav-tab-label\">${p.tabLabel}<\u002Fdiv>\n      <\u002Fbutton>`).join('');\n  }\n\n  function switchTab(id) {\n    activeTabId = id;\n    buildNav();\n    document.getElementById('custom-picker').style.display = id === 'custom' ? 'block' : 'none';\n    renderCurrentView(lastResults);\n  }\n\n  // ── Custom picker ───────────────────────────────────────────────\n\n  function buildPicker() {\n    const opts = Object.entries(STATIONS).map(([code, name]) => `<option value=\"${code}\">${name}<\u002Foption>`).join('');\n    const selFrom = document.getElementById('sel-from');\n    const selTo   = document.getElementById('sel-to');\n    selFrom.innerHTML = opts; selTo.innerHTML = opts;\n    selFrom.value = 'GRV'; selTo.value = '23S';\n    selFrom.addEventListener('change', () => renderCurrentView(lastResults));\n    selTo.addEventListener('change',   () => renderCurrentView(lastResults));\n  }\n\n  // ── Progress ────────────────────────────────────────────────────\n\n  function startProgress() {\n    const fill = document.getElementById('progress-fill');\n    fill.style.transition = 'none'; fill.style.width = '0%';\n    fill.getBoundingClientRect();\n    fill.style.transition = `width ${REFRESH_MS / 1000}s linear`;\n    fill.style.width = '100%';\n  }\n\n  // ── Fetch ────────────────────────────────────────────────────────\n\n  async function refresh() {\n    clearTimeout(refreshTimer);\n    startProgress();\n    const statusEl = document.getElementById('status');\n    statusEl.textContent = 'Updating…';\n    statusEl.className = '';\n    try {\n      const [trainsRes, alertsRes] = await Promise.allSettled([fetch(API_URL), fetch(ALERTS_URL)]);\n      if (trainsRes.status === 'fulfilled' && trainsRes.value.ok) {\n        const data = await trainsRes.value.json();\n        lastResults = data.results || [];\n        renderCurrentView(lastResults);\n      } else { throw new Error('Train fetch failed'); }\n      if (alertsRes.status === 'fulfilled' && alertsRes.value.ok) {\n        const alertData = await alertsRes.value.json();\n        const incidents = Array.isArray(alertData)\n          ? alertData\n          : (alertData.data || alertData.incidents || alertData.results || alertData.items || []);\n        renderAlerts(incidents);\n      }\n      const now = new Date();\n      statusEl.innerHTML = `${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}<br><span style=\"color:var(--dim);font-size:9px\">auto ↻ 30s<\u002Fspan>`;\n    } catch (err) {\n      statusEl.textContent = 'Error'; statusEl.className = 'error'; console.error(err);\n    }\n    refreshTimer = setTimeout(refresh, REFRESH_MS);\n  }\n\n  function manualRefresh() { clearTimeout(refreshTimer); refresh(); }\n\n  // ── Init ─────────────────────────────────────────────────────────\n\n  buildNav();\n  buildPicker();\n  updateDirCounter();\n  loadSchedule();\n  refresh();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
